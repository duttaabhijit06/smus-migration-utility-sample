AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  Master template for the SMUS bootstrap. Composes five child stacks:
  domain (V2 + IAM + KMS + IDC ownership), 17 blueprints + provisioning
  IAM + tooling bucket, 4 project profiles (incl. All capabilities),
  policy grants for blueprints + profiles, and an admin project owned
  by the IDC user smus-admin.

# Why a custom master rather than the upstream `create_domain.yaml`:
#   * The upstream master assumes pre-existing IAM roles and references
#     two extra cross-org sub-stacks (fetch_accounts, create_resource_share)
#     that aren't relevant to a single-account migration test bed.
#   * The upstream master leaves IDC ownership unwired — we need explicit
#     UserProfile/GroupProfile/Owner records so smus-admin owns the
#     RootDomainUnit and the admin project from creation.
#   * MANUAL UserAssignment is required so we control which IDC users
#     get a SMUS profile (rather than auto-creating one for every IDC
#     user the application sees).

Parameters:
  ChildStacksBucketName:
    Type: String
    Description: S3 bucket holding the 5 child templates (uploaded by migrate.sh).

  pSUSDomainName:
    Type: String
    Default: smus-seed-domain

  pSUSDomainExecutionRoleName:
    Type: String
    Default: smus-seed-domain-execution-role

  pSUSDomainServiceRoleName:
    Type: String
    Default: smus-seed-domain-service-role

  pSUSAutomationRoleName:
    Type: String
    Default: smus-seed-automation-role

  pSUSDomainAutomationRolePolicyName:
    Type: String
    Default: smus-seed-automation-policy

  pSUSDomainManagedAccessRoleName:
    Type: String
    Default: smus-seed-managed-access-role

  pSUSToolingBPVpcId:
    Type: String
    Description: Seed VPC ID — used for blueprint regional parameters.

  pSUSToolingBPSubnets:
    Type: String
    Description: Comma-delimited private subnet IDs for blueprint regional parameters.

  pSUSBPToolingBucketName:
    Type: String
    Description: S3 bucket name created by the blueprint stack for Tooling.

  pSSOGroupID:
    Type: String
    Description: IDC group ID — owns the admin project (PROJECT_OWNER) and the root domain unit. Members of this group inherit project ownership through SMUS's group resolution; no individual SSO user needs to be added.

  pSSOInstanceArn:
    Type: String
    Description: IDC instance ARN — pins the domain's SingleSignOn to the account-local instance.

  pSUSProjectsBucketName:
    Type: String
    Description: >-
      Name of the DataZone projects S3 bucket. Made stack-unique by
      smus-setup.sh (e.g. amazon-datazone-projects-<acct>-<region>-<stack>)
      so multiple SMUS deployments in the same account+region don't
      collide. Operator can override directly.

  pAdminProjectName:
    Type: String
    Default: smus-admin

  pLambdaSourceBucket:
    Type: String
    Description: >-
      S3 bucket containing the unzipped Lambda .py source files. The
      publisher uploads `cfn/lambda/handler/*.py` to
      `s3://<pLambdaSourceBucket>/<pLambdaSourcePrefix>lambda/` before
      stack create. The LambdaBuildStack's CodeBuild zips them and
      writes the result to <ChildStacksBucketName>/setup_handler.zip,
      which `rSetupHandler` then references as its Code.S3Bucket/Key.

  pLambdaSourcePrefix:
    Type: String
    Default: ''
    Description: >-
      Optional S3 key prefix inside <pLambdaSourceBucket>. Trailing
      slash recommended. Default reads from the bucket root.

  # ---------------------------------------------------------------------------
  # Git repository / connection wiring (managed at the DOMAIN level).
  #
  # Per the SageMaker Unified Studio admin guide, Git connections attach
  # at the domain level (account-scoped CodeConnections resource that
  # SMUS auto-surfaces on the domain's Connections tab) and are then
  # enabled per-project by an admin. CodeCommit gets a default
  # connection from SMUS automatically — we just create the underlying
  # repository. 3P providers (GitHub, GitLab, Bitbucket) require an
  # AWS::CodeConnections::Connection that lands in PENDING and must be
  # authorized once via the AWS console (one-time OAuth handshake).
  #
  # Selection rule (driven by the operator's CLI flags via smus-setup.sh):
  #   * pRepoProvider=CodeCommit (default) and pRepoUrl=='' →
  #       create AWS::CodeCommit::Repository named pRepoName.
  #   * pRepoProvider in {GitHub,GitLab,Bitbucket} AND pRepoUrl!='' →
  #       create AWS::CodeConnections::Connection named pRepoName.
  #       Operator authorizes once via the URL emitted in the stack
  #       outputs; no subsequent CFN action required.
  #
  # GitHub Enterprise Server / GitLab Self-Managed are NOT supported
  # via this stack because they require a separate CodeConnections
  # Host resource that itself needs an OAuth handshake. For those,
  # operators should pre-create the connection in the AWS console and
  # pin pRepoConnectionArn (which short-circuits the create here).
  # ---------------------------------------------------------------------------

  pRepoProvider:
    Type: String
    Default: CodeCommit
    AllowedValues:
      - CodeCommit
      - GitHub
      - GitLab
      - Bitbucket
    Description: >-
      Git provider for the SMUS domain's primary repository connection.
      Default CodeCommit creates an in-account repository. Any 3P value
      creates an AWS CodeConnections connection that the operator must
      authorize once via the AWS console (URL emitted in stack outputs).

  pRepoName:
    Type: String
    Default: smus-seed-domain-migration
    Description: >-
      Name for the CodeCommit repository (when pRepoProvider=CodeCommit)
      OR for the AWS CodeConnections connection (when 3P). Used as the
      logical handle the SMUS portal shows on the domain Connections tab.

  pRepoUrl:
    Type: String
    Default: ''
    Description: >-
      Repository URL — required for 3P providers (e.g.
      https://github.com/<org>/<repo>.git), ignored for CodeCommit. For
      CodeCommit the clone URL is computed from the repo ARN.

  pRepoConnectionArn:
    Type: String
    Default: ''
    Description: >-
      Pre-existing AWS CodeConnections ARN. When set, this stack
      DOES NOT create a connection — it only grants the project user
      role permission to use the supplied ARN. Use this for
      GitHub Enterprise Server / GitLab Self-Managed (which need a
      Host resource that's easier to create in the console).

Conditions:
  # Branch one: in-account CodeCommit repo.
  cIsCodeCommit: !Equals [!Ref pRepoProvider, 'CodeCommit']
  # Branch two: 3P provider AND no pre-existing connection ARN —
  # so this stack creates the connection.
  cIs3PCreate: !And
    - !Not [!Equals [!Ref pRepoProvider, 'CodeCommit']]
    - !Equals [!Ref pRepoConnectionArn, '']
  # Aggregate: any 3P (whether we create or reuse).
  cIs3P: !Not [!Equals [!Ref pRepoProvider, 'CodeCommit']]
  # Operator pinned a pre-existing connection.
  cReuseConnection: !And
    - !Not [!Equals [!Ref pRepoProvider, 'CodeCommit']]
    - !Not [!Equals [!Ref pRepoConnectionArn, '']]

Resources:
  # -------------------------------------------------------------------------
  # LambdaBuildStack — zips the loose .py source into a Lambda zip.
  # Runs in parallel with DomainStack since they're independent.
  # -------------------------------------------------------------------------
  LambdaBuildStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub https://${ChildStacksBucketName}.s3.amazonaws.com/sus-lambda-build-stack.yaml
      Parameters:
        pSourceBucket: !Ref pLambdaSourceBucket
        pSourcePrefix: !Ref pLambdaSourcePrefix
        pBuildBucket: !Ref ChildStacksBucketName

  DomainStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub https://${ChildStacksBucketName}.s3.amazonaws.com/sus-domain-stack.yaml
      Parameters:
        pSUSDomainExecutionRoleName: !Ref pSUSDomainExecutionRoleName
        pSUSDomainServiceRoleName: !Ref pSUSDomainServiceRoleName
        pSUSAutomationRoleName: !Ref pSUSAutomationRoleName
        pSUSDomainName: !Ref pSUSDomainName
        pSUSDomainAutomationRolePolicyName: !Ref pSUSDomainAutomationRolePolicyName
        pSSOGroupID: !Ref pSSOGroupID
        pSSOInstanceArn: !Ref pSSOInstanceArn
        pSUSProjectsBucketName: !Ref pSUSProjectsBucketName
        pParentStackName: !Ref AWS::StackName

  BlueprintStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: DomainStack
    Properties:
      TemplateURL: !Sub https://${ChildStacksBucketName}.s3.amazonaws.com/sus-blueprints-stack.yaml
      Parameters:
        pSUSBPToolingBucketName: !Ref pSUSBPToolingBucketName
        pSUSDomainManagedAccessRoleName: !Ref pSUSDomainManagedAccessRoleName
        pSUSDomainid: !GetAtt DomainStack.Outputs.oSUSDomainID
        pSUSDomainExecutionRoleArn: !GetAtt DomainStack.Outputs.oSUSDomainExecutionRoleArn
        pSUSToolingBPSubnets: !Ref pSUSToolingBPSubnets
        pSUSToolingBPVpcId: !Ref pSUSToolingBPVpcId
        pParentStackName: !Ref AWS::StackName

  ProjectProfileStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: BlueprintStack
    Properties:
      TemplateURL: !Sub https://${ChildStacksBucketName}.s3.amazonaws.com/sus-project-profiles-stack.yaml
      Parameters:
        DomainId: !GetAtt DomainStack.Outputs.oSUSDomainID
        DomainUnitId: !GetAtt DomainStack.Outputs.oSUSrootDomainUnitID
        AccountId: !Ref AWS::AccountId
        Region: !Ref AWS::Region
        LakehouseCatalogId: !GetAtt BlueprintStack.Outputs.LakehouseCatalogId
        AmazonBedrockGuardrailId: !GetAtt BlueprintStack.Outputs.AmazonBedrockGuardrailId
        MLExperimentsId: !GetAtt BlueprintStack.Outputs.MLExperimentsId
        ToolingId: !GetAtt BlueprintStack.Outputs.ToolingId
        RedshiftServerlessId: !GetAtt BlueprintStack.Outputs.RedshiftServerlessId
        EmrServerlessId: !GetAtt BlueprintStack.Outputs.EmrServerlessId
        WorkflowsId: !GetAtt BlueprintStack.Outputs.WorkflowsId
        AmazonBedrockPromptId: !GetAtt BlueprintStack.Outputs.AmazonBedrockPromptId
        DataLakeId: !GetAtt BlueprintStack.Outputs.DataLakeId
        AmazonBedrockEvaluationId: !GetAtt BlueprintStack.Outputs.AmazonBedrockEvaluationId
        AmazonBedrockKnowledgeBaseId: !GetAtt BlueprintStack.Outputs.AmazonBedrockKnowledgeBaseId
        PartnerAppsId: !GetAtt BlueprintStack.Outputs.PartnerAppsId
        AmazonBedrockChatAgentId: !GetAtt BlueprintStack.Outputs.AmazonBedrockChatAgentId
        AmazonBedrockFunctionId: !GetAtt BlueprintStack.Outputs.AmazonBedrockFunctionId
        AmazonBedrockFlowId: !GetAtt BlueprintStack.Outputs.AmazonBedrockFlowId
        EmrOnEc2Id: !GetAtt BlueprintStack.Outputs.EmrOnEc2Id
        QuickSightId: !GetAtt BlueprintStack.Outputs.QuickSightId

  PolicyGrantStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: ProjectProfileStack
    Properties:
      TemplateURL: !Sub https://${ChildStacksBucketName}.s3.amazonaws.com/sus-policy-grant-stack.yaml
      Parameters:
        DomainId: !GetAtt DomainStack.Outputs.oSUSDomainID
        DomainUnitId: !GetAtt DomainStack.Outputs.oSUSrootDomainUnitID
        AccountId: !Ref AWS::AccountId
        LakehouseCatalogId: !GetAtt BlueprintStack.Outputs.LakehouseCatalogId
        AmazonBedrockGuardrailId: !GetAtt BlueprintStack.Outputs.AmazonBedrockGuardrailId
        MLExperimentsId: !GetAtt BlueprintStack.Outputs.MLExperimentsId
        ToolingId: !GetAtt BlueprintStack.Outputs.ToolingId
        RedshiftServerlessId: !GetAtt BlueprintStack.Outputs.RedshiftServerlessId
        EmrServerlessId: !GetAtt BlueprintStack.Outputs.EmrServerlessId
        WorkflowsId: !GetAtt BlueprintStack.Outputs.WorkflowsId
        AmazonBedrockPromptId: !GetAtt BlueprintStack.Outputs.AmazonBedrockPromptId
        DataLakeId: !GetAtt BlueprintStack.Outputs.DataLakeId
        AmazonBedrockEvaluationId: !GetAtt BlueprintStack.Outputs.AmazonBedrockEvaluationId
        AmazonBedrockKnowledgeBaseId: !GetAtt BlueprintStack.Outputs.AmazonBedrockKnowledgeBaseId
        PartnerAppsId: !GetAtt BlueprintStack.Outputs.PartnerAppsId
        AmazonBedrockChatAgentId: !GetAtt BlueprintStack.Outputs.AmazonBedrockChatAgentId
        AmazonBedrockFunctionId: !GetAtt BlueprintStack.Outputs.AmazonBedrockFunctionId
        AmazonBedrockFlowId: !GetAtt BlueprintStack.Outputs.AmazonBedrockFlowId
        EmrOnEc2Id: !GetAtt BlueprintStack.Outputs.EmrOnEc2Id
        QuickSightId: !GetAtt BlueprintStack.Outputs.QuickSightId
        SQLAnalyticsProfileId: !GetAtt ProjectProfileStack.Outputs.SQLAnalyticsProfileId
        AllCapabilitiesProjectProfileId: !GetAtt ProjectProfileStack.Outputs.AllCapabilitiesProjectProfileId
        GenerativeAIApplicationDevelopmentProfileId: !GetAtt ProjectProfileStack.Outputs.GenerativeAIApplicationDevelopmentProfileId

  ProjectStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: PolicyGrantStack
    Properties:
      TemplateURL: !Sub https://${ChildStacksBucketName}.s3.amazonaws.com/sus-project-stack.yaml
      Parameters:
        pSUSDomainid: !GetAtt DomainStack.Outputs.oSUSDomainID
        pToolingProjectProfileId: !GetAtt ProjectProfileStack.Outputs.AllCapabilitiesProjectProfileId
        pName: !Ref pAdminProjectName
        pSUSAutomationRoleArn: !GetAtt DomainStack.Outputs.oSUSAutomationRoleArn
        pSSOGroupID: !Ref pSSOGroupID
        pSUSProvisioningRoleArn: !GetAtt BlueprintStack.Outputs.oSUSDomainProvisioningRole
        pSUSManagedAccessRoleArn: !GetAtt BlueprintStack.Outputs.oSUSDomainManagedAccessRole

  # ---------------------------------------------------------------------------
  # Git wiring — created conditionally based on pRepoProvider.
  #
  # CodeCommit branch: AWS::CodeCommit::Repository in-account. SMUS
  # auto-creates a default CodeCommit connection for every domain, so
  # nothing else is needed — `migrate.sh` later sees the repo by name.
  #
  # 3P branch: AWS::CodeConnections::Connection in PENDING state until
  # the operator authorizes. The Lambda Custom Resource emits the
  # authorize URL via stack outputs.
  # ---------------------------------------------------------------------------

  rCodeCommitRepo:
    Type: AWS::CodeCommit::Repository
    Condition: cIsCodeCommit
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      RepositoryName: !Ref pRepoName
      RepositoryDescription: !Sub 'Created by smus-seed CFN stack for ${pSUSDomainName}.'

  r3PConnection:
    Type: AWS::CodeConnections::Connection
    Condition: cIs3PCreate
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      ConnectionName: !Ref pRepoName
      ProviderType: !Ref pRepoProvider

  # ---------------------------------------------------------------------------
  # Custom Resource setup + teardown — encapsulates the post-deploy AWS CLI
  # operations that CloudFormation can't model directly (LF grants on
  # pre-existing seed Glue, KMS key policy on dynamic project user role,
  # IAM inlines on dynamic role, WithFederation S3 re-registration, plus
  # the 9 hardening passes for delete).
  #
  # Code lives in cfn/lambda/handler/. `smus-setup.sh` runs the build
  # script before deploy, which zips the handler and uploads it to
  # ${ChildStacksBucketName}/setup_handler.zip alongside the templates.
  #
  # Execution role: re-uses `rSUSAutomationRole` (in sus-domain-stack.yaml).
  # That role is already trusted by lambda.amazonaws.com, registered as
  # a DataZone domain owner, and (per our edits to rSUSAutomationRolePolicy)
  # carries every IAM/LF/Glue/KMS/EC2/S3/datazone permission the handler
  # needs. Reusing it keeps the IAM surface in one place.
  # ---------------------------------------------------------------------------

  rSetupHandler:
    Type: AWS::Lambda::Function
    DependsOn:
      - DomainStack
      - LambdaBuildStack
    Properties:
      Handler: handler.handler
      Runtime: python3.12
      Timeout: 900           # 15-min hard limit
      MemorySize: 512
      Role: !GetAtt DomainStack.Outputs.oSUSAutomationRoleArn
      Code:
        S3Bucket: !GetAtt LambdaBuildStack.Outputs.oBuildArtifactS3Bucket
        S3Key: !GetAtt LambdaBuildStack.Outputs.oBuildArtifactS3Key
      Description: SMUS post-deploy setup + pre-delete teardown handler.

  # rPostDeploy fires on stack Create/Update; depends on every nested
  # stack so it's the LAST thing to run during create. Its inverse —
  # `rPreDelete` — has NO DependsOn, so CFN deletes it FIRST during
  # stack delete (and the rest of the stack waits on its SUCCESS).
  rPostDeploy:
    Type: Custom::SUSPostDeploy
    DependsOn:
      - DomainStack
      - BlueprintStack
      - ProjectProfileStack
      - PolicyGrantStack
      - ProjectStack
    Properties:
      ServiceToken: !GetAtt rSetupHandler.Arn
      Action: setup
      Region: !Ref AWS::Region
      DomainId: !GetAtt DomainStack.Outputs.oSUSDomainID
      AdminProjectId: !GetAtt ProjectStack.Outputs.oAdminProjectId
      LFRegistrationRoleArn: !GetAtt DomainStack.Outputs.oSUSLFRegistrationRoleArn
      ManageAccessRoleArn: !GetAtt BlueprintStack.Outputs.oSUSDomainManagedAccessRole
      ToolingBucketName: !Ref pSUSBPToolingBucketName
      RepoProvider: !Ref pRepoProvider
      RepoName: !Ref pRepoName
      # Pass the resolved CodeCommit ARN when CodeCommit was created
      # here, otherwise empty. The Lambda uses this to scope the
      # `codecommit:GitPull/GitPush` grant on the project user role.
      CodeCommitRepoArn:
        !If [cIsCodeCommit, !GetAtt rCodeCommitRepo.Arn, '']
      # Connection ARN (either the one we created or a pre-existing
      # one the operator pinned). Empty for CodeCommit. Lambda uses
      # this to scope the `codeconnections:UseConnection` grant on
      # the project user role and to emit the authorize-URL output.
      ConnectionArn: !If
        - cIs3PCreate
        - !Ref r3PConnection
        - !If
          - cReuseConnection
          - !Ref pRepoConnectionArn
          - ''
      RepoUrl: !Ref pRepoUrl

  rPreDelete:
    Type: Custom::SUSPreDelete
    Properties:
      ServiceToken: !GetAtt rSetupHandler.Arn
      Action: teardown
      Region: !Ref AWS::Region
      DomainId: !GetAtt DomainStack.Outputs.oSUSDomainID
      AdminProjectId: !GetAtt ProjectStack.Outputs.oAdminProjectId
      # Pass the actual tooling bucket name so the Lambda's
      # _discover_runtime doesn't have to reconstruct it from a
      # naming convention. Since the bucket is now stack-suffixed,
      # the bare `amazon-datazone-tooling-<acct>-<region>` pattern
      # the Lambda used to assume no longer matches.
      ToolingBucketName: !Ref pSUSBPToolingBucketName


Outputs:
  oSUSDomainID:
    Description: Domain ID (V2)
    Value: !GetAtt DomainStack.Outputs.oSUSDomainID

  oSUSrootDomainUnitID:
    Description: Root domain unit ID
    Value: !GetAtt DomainStack.Outputs.oSUSrootDomainUnitID

  oSUSDomainExecutionRoleArn:
    Value: !GetAtt DomainStack.Outputs.oSUSDomainExecutionRoleArn

  oSUSDomainServiceRoleArn:
    Value: !GetAtt DomainStack.Outputs.oSUSDomainServiceRoleArn

  oAllCapabilitiesProjectProfileId:
    Description: 'All capabilities project profile ID — used by the migration tool'
    Value: !GetAtt ProjectProfileStack.Outputs.AllCapabilitiesProjectProfileId

  oAdminProjectId:
    Description: 'Admin SUS project ID — owned by smus-admin (IDC SSO)'
    Value: !GetAtt ProjectStack.Outputs.oAdminProjectId

  oAdminProjectName:
    Value: !GetAtt ProjectStack.Outputs.oAdminProjectName

  # ---- Git repository / connection wiring ---------------------------------
  oRepoProvider:
    Description: 'Git provider for the domain (CodeCommit | GitHub | GitLab | Bitbucket).'
    Value: !Ref pRepoProvider

  oRepoName:
    Description: 'Repository or connection name as shown in the SMUS domain Connections tab.'
    Value: !Ref pRepoName

  oCodeCommitRepoArn:
    Description: 'ARN of the in-account CodeCommit repository (empty when 3P).'
    Condition: cIsCodeCommit
    Value: !GetAtt rCodeCommitRepo.Arn

  oCodeCommitCloneUrlHttp:
    Description: 'HTTPS clone URL for CodeCommit (empty when 3P).'
    Condition: cIsCodeCommit
    Value: !GetAtt rCodeCommitRepo.CloneUrlHttp

  oRepoConnectionArn:
    Description: 'CodeConnections ARN — either created here or operator-pinned (empty for CodeCommit).'
    Condition: cIs3P
    Value: !If
      - cIs3PCreate
      - !Ref r3PConnection
      - !Ref pRepoConnectionArn

  oRepoConnectionAuthorizeUrl:
    Description: >-
      ACTION REQUIRED for 3P providers: open this URL once in the AWS
      console to complete the OAuth handshake. Until done, the
      connection state is PENDING and Git pulls fail.
    Condition: cIs3PCreate
    Value: !Sub 'https://${AWS::Region}.console.aws.amazon.com/codesuite/settings/connections'

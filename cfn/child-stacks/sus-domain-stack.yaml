AWSTemplateFormatVersion: '2010-09-09'
Description: "SMUS bootstrap — domain stack (KMS key, IAM roles, Domain, IDC user/group profiles, owners)"

# Verbatim from aws-samples/sample-automate-sagemaker-unified-studio-using-iac/main/child-stacks/sus-domain-stack.yaml (MIT-0).
# We intentionally do not modify this — it's the canonical reference for
# how to bootstrap a V2 SMUS domain with proper SSO ownership.

Parameters:
  pSUSDomainExecutionRoleName:
    Type: String
    Description: Name of the SUS Domain execution role
  pSUSDomainServiceRoleName:
    Type: String
    Description: Name of the SUS Domain service role
  pSUSAutomationRoleName:
    Type: String
    Description: IAM Role used by Lambda execution role for custom resources
  pSUSDomainName:
    Type: String
    Description: Name of the SUS Domain
  pSUSDomainAutomationRolePolicyName:
    Type: String
    Description: Name of Automation role policy
  pSSOGroupID:
    Type: String
    Description: SSO Group ID to be added as Domain Unit Owner
  pSSOInstanceArn:
    Type: String
    Description: IDC instance ARN — pins the domain's SingleSignOn to the account-local instance so DataZone resolves user/group IDs against the right identity store.
  pSUSProjectsBucketName:
    Type: String
    Description: >-
      Name of the S3 bucket that DataZone uses for project storage.
      Operator-supplied so it can be made stack-unique (the script
      caps the stack-name suffix to fit S3's 63-char limit).
  pParentStackName:
    Type: String
    Description: >-
      Name of the top-level (parent) CFN stack. Threaded through from
      master-stack.yaml as `!Ref AWS::StackName`. Used to suffix
      named IAM resources for stack uniqueness without picking up the
      auto-generated nested-stack name (which would overflow IAM's
      64-char role-name limit).

Resources:
  rSUSDomainKMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS key for SUS domain encryption
      KeyPolicy:
        Version: '2012-10-17'
        Id: SUS-DOMAIN
        Statement:
          - Sid: 'Enable IAM User Permissions'
            Effect: 'Allow'
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'
          - Sid: "AllowDatazoneRoles"
            Effect: "Allow"
            Principal:
              AWS: "*"
            Action:
              - "kms:Decrypt"
              - "kms:GenerateDataKey"
            Resource: "*"
            Condition:
              StringLike:
                aws:PrincipalArn:
                  - !Sub "arn:aws:iam::${AWS::AccountId}:role/datazone_*"
      EnableKeyRotation: true

  rSUSDomainKMSKeyAlias:
    Type: 'AWS::KMS::Alias'
    DeletionPolicy: Retain
    Properties:
      AliasName: !Sub alias/${AWS::StackName}-SUSKey
      TargetKeyId: !Ref rSUSDomainKMSKey

  rSUSAutomationRolePolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Permissions for SUS Domain automation Lambda function
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DomainCreation
            Effect: Allow
            Action:
              - datazone:CreateDomain
              - datazone:UpdateDomain
              - datazone:TagResource
              - datazone:GetDomain
              - datazone:GetDomainUnit
              - datazone:ListDomains
              # Setup + teardown helpers (rPostDeploy, rPreDelete) need
              # these to discover the project user role + drain envs.
              - datazone:GetProject
              - datazone:ListProjects
              - datazone:DeleteProject
              - datazone:ListEnvironments
              - datazone:GetEnvironment
              - datazone:DeleteEnvironment
              - datazone:ListSubscriptions
              - datazone:CancelSubscription
              - datazone:RevokeSubscription
            Resource:
              - !Sub 'arn:aws:datazone:${AWS::Region}:${AWS::AccountId}:domain/*'
          - Sid: domainkey
            Effect: Allow
            Action:
              - kms:Decrypt
              - kms:GenerateDataKey
              - kms:DescribeKey
              - kms:CreateGrant
            Resource:
              - !GetAtt rSUSDomainKMSKey.Arn
          - Sid: ToolingKMSPolicyMutation
            Effect: Allow
            Action:
              - kms:DescribeKey
              - kms:GetKeyPolicy
              - kms:PutKeyPolicy
            Resource: '*'
          - Sid: IAM
            Effect: Allow
            Action:
              - iam:PassRole
            Resource:
              - !GetAtt rSUSDomainExecutionRole.Arn
              - !GetAtt rSUSDomainServiceRole.Arn
          - Sid: sso
            Effect: Allow
            Action:
              - sso:ListInstances
              - sso:CreateApplication
              - sso:PutApplicationAssignmentConfiguration
              - sso:PutApplicationGrant
              - sso:PutApplicationAuthenticationMethod
              - sso:PutApplicationAccessScope
              - sso-admin:ListInstances
              - identitystore:DescribeGroup
              - identitystore:GetGroupId
              - identitystore:ListGroups
            Resource:
              - 'arn:aws:sso:::instance/*'
              - 'arn:aws:sso::aws:applicationProvider/*'
              - 'arn:aws:sso::*:application/*/*'
              - '*'
          - Sid: IAMRoleAccess
            Effect: Allow
            Action:
              - iam:GetRole
              - iam:ListRolePolicies
              - iam:ListAttachedRolePolicies
            Resource: !Sub arn:aws:iam::${AWS::AccountId}:role/*
          - Sid: ProjectUserRoleInlineMutation
            Effect: Allow
            Action:
              - iam:PutRolePolicy
              - iam:DeleteRolePolicy
              - iam:GetRolePolicy
            Resource: !Sub 'arn:aws:iam::${AWS::AccountId}:role/datazone_usr_role_*'
          - Sid: LakeFormationMutations
            Effect: Allow
            Action:
              - lakeformation:GetDataLakeSettings
              - lakeformation:PutDataLakeSettings
              - lakeformation:GrantPermissions
              - lakeformation:RevokePermissions
              - lakeformation:RegisterResource
              - lakeformation:DeregisterResource
              - lakeformation:ListResources
              - lakeformation:DescribeResource
            Resource: '*'
          - Sid: GlueCatalogWalk
            Effect: Allow
            Action:
              - glue:GetDatabase
              - glue:GetDatabases
              - glue:GetTable
              - glue:GetTables
              - glue:UpdateDatabase
              - glue:DeleteDatabase
              - glue:DeleteTable
            Resource: '*'
          - Sid: ToolingBucketAccess
            Effect: Allow
            Action:
              - s3:GetEncryptionConfiguration
              - s3:ListBucket
              - s3:ListBucketVersions
              - s3:DeleteObject
              - s3:DeleteObjectVersion
              - s3:DeleteBucket
              - s3:GetObject
              - s3:GetBucketTagging
            Resource:
              - !Sub 'arn:aws:s3:::amazon-datazone-tooling-${AWS::AccountId}-*'
              - !Sub 'arn:aws:s3:::amazon-datazone-tooling-${AWS::AccountId}-*/*'
          - Sid: TeardownEC2
            Effect: Allow
            Action:
              - ec2:DescribeNetworkInterfaces
              - ec2:DescribeVpcEndpoints
              - ec2:DescribeSecurityGroups
              - ec2:DescribeSecurityGroupRules
              - ec2:DetachNetworkInterface
              - ec2:DeleteNetworkInterface
              - ec2:DeleteVpcEndpoints
              - ec2:RevokeSecurityGroupIngress
            Resource: '*'
          - Sid: TeardownAthena
            # Pass A2 of the rPreDelete Lambda terminates active
            # Athena Spark sessions on the project's workgroup. SMUS
            # provisions the workgroup with the well-known name
            # `sagemaker-studio-spark-workgroup-<projectId>` inside
            # its own DataZone-Env-* nested stack. Without this,
            # active sessions block the workgroup delete and cascade
            # into a DELETE_FAILED on the parent project.
            Effect: Allow
            Action:
              - athena:ListWorkGroups
              - athena:ListSessions
              - athena:TerminateSession
            Resource: '*'
          - Sid: STS
            Effect: Allow
            Action: sts:GetCallerIdentity
            Resource: '*'
          - Sid: CodeConnectionsRead
            # Read-only describe for the connection so the post-deploy
            # Lambda can surface the live ConnectionStatus (PENDING /
            # AVAILABLE / ERROR) in the CR Data without needing to
            # mutate anything. Connection mutation is handled by CFN
            # itself (AWS::CodeConnections::Connection resource).
            Effect: Allow
            Action:
              - codeconnections:GetConnection
              - codeconnections:ListConnections
              - codestar-connections:GetConnection
              - codestar-connections:ListConnections
            Resource: '*'
          - Sid: CloudWatchLogs
            Effect: Allow
            Action:
              - logs:CreateLogGroup
              - logs:CreateLogStream
              - logs:PutLogEvents
            Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:*'

  rSUSAutomationRole:
    Type: AWS::IAM::Role
    Properties:
      Description: IAM Role assumed by custom resource Lambda function
      RoleName: !Ref pSUSAutomationRoleName
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - !Ref rSUSAutomationRolePolicy

  rSUSDomainExecutionRoleKMSPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: KMS access permissions for SUS Domain execution role
      PolicyDocument:
        Version: 2012-10-17
        Statement:
          - Sid: domainkey
            Effect: Allow
            Action:
              - 'kms:Decrypt'
              - 'kms:DescribeKey'
              - 'kms:GenerateDataKey'
            Resource: !GetAtt rSUSDomainKMSKey.Arn

  rSUSDomainExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      Description: IAM Role assumed by SageMaker Domain to call APIs to Amazon SageMaker Unified Studio.
      RoleName: !Ref pSUSDomainExecutionRoleName
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          # DataZone control plane (V2 domain create + maintenance).
          - Effect: Allow
            Principal:
              Service: datazone.amazonaws.com
            Action:
              - sts:AssumeRole
              - sts:TagSession
              - sts:SetContext
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref 'AWS::AccountId'
              ForAllValues:StringLike:
                aws:TagKeys:
                  - 'datazone*'
          # SageMaker control plane (Studio environment provisioning).
          # Required by step 01_create-smus-domain when the orchestrator
          # falls back to the well-known role name.
          - Effect: Allow
            Principal:
              Service: sagemaker.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/SageMakerStudioDomainExecutionRolePolicy
        - arn:aws:iam::aws:policy/AmazonDataZoneFullAccess
        - !Ref rSUSDomainExecutionRoleKMSPolicy

  rSUSDomainServiceRole:
    Type: AWS::IAM::Role
    Properties:
      Description: IAM Role assumed by SageMaker Domain to perform domain level actions.
      RoleName: !Ref pSUSDomainServiceRoleName
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: datazone.amazonaws.com
            Action:
              - sts:AssumeRole
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref 'AWS::AccountId'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/SageMakerStudioDomainServiceRolePolicy

  # ---------------------------------------------------------------------------
  # rSUSToolingProvisioningRole
  #
  # Tooling-blueprint provisioning role. DataZone (and the CFN sub-stacks
  # it creates per environment) assumes this role to provision compute,
  # storage, and IAM artifacts for project environments.
  #
  # Trust:  datazone.amazonaws.com + cloudformation.amazonaws.com
  # Permissions: AmazonDataZoneSageMakerProvisioningRolePolicy + AdministratorAccess.
  #
  # The AdministratorAccess attachment matches the stock SMUS All-capabilities
  # blueprint expectation; it can be tightened by replacing it with a
  # scoped policy if your account requires it.
  # ---------------------------------------------------------------------------
  rSUSToolingProvisioningRole:
    Type: AWS::IAM::Role
    Properties:
      # Suffix with the parent stack name (NOT ${AWS::StackName} —
      # that would resolve to the nested sub-stack's auto-generated
      # name like `smus-admin-stack-DomainStack-1A2B3C` which
      # overflows IAM's 64-char roleName limit).
      RoleName: !Sub sagemaker-studio-provisioning-role-${pParentStackName}
      Description: SageMaker Unified Studio Tooling provisioning role.
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: datazone.amazonaws.com
            Action: sts:AssumeRole
          - Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonDataZoneSageMakerProvisioningRolePolicy
        - arn:aws:iam::aws:policy/AdministratorAccess

  # ---------------------------------------------------------------------------
  # rSUSProjectsBucket
  #
  # SMUS scans for buckets prefixed `amazon-datazone-projects-` to use as
  # project-asset storage. The Tooling bucket (in sus-blueprints-stack.yaml)
  # is the primary; this one matches the secondary discovery token used by
  # some downstream blueprints.
  # ---------------------------------------------------------------------------
  rSUSProjectsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      # Suffix with the parent stack name so two SMUS deployments
      # in the same account+region get distinct project buckets.
      # S3 bucket names are limited to 63 chars; the fixed prefix
      # (amazon-datazone-projects-<acct>-<region>) already eats
      # ~49 chars, so we use a parameter the operator-side script
      # passes in (already capped at 14 chars from the stack name).
      BucketName: !Ref pSUSProjectsBucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # ---------------------------------------------------------------------------
  # rSUSLFRegistrationRole
  #
  # Lake Formation needs a dedicated IAM role to act as the data-access
  # principal for S3 prefix registrations that use --with-federation
  # --hybrid-access-enabled. Without this role, Athena Spark workgroups
  # cannot vend per-table credentials for tables backed by external
  # (seed) S3 buckets.
  #
  # Used by `_smus_session_bootstrap` in smus-setup.sh which loops over
  # every external Glue DB, takes the unique set of S3 prefixes, and
  # re-registers each with this role as the registration principal.
  #
  # Trust:  lakeformation.amazonaws.com + glue.amazonaws.com
  # Permissions: read source S3 buckets + GetTable/GetDatabase + LF data
  #              access. Resource scope is "*" because the helper rotates
  #              through any number of seed buckets and we don't know
  #              their names at deploy time.
  # ---------------------------------------------------------------------------
  rSUSLFRegistrationRole:
    Type: AWS::IAM::Role
    Properties:
      # Use parent stack name (see comment on rSUSToolingProvisioningRole
      # above for why ${AWS::StackName} can't be used here).
      RoleName: !Sub smus-seed-lf-registration-role-${pParentStackName}
      Description: Data-access role used by Lake Formation to register source S3 prefixes with WithFederation=true.
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lakeformation.amazonaws.com
                - glue.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: LFRegistrationPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: S3DataAccess
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                  - s3:GetBucketLocation
                  - s3:GetBucketAcl
                Resource: '*'
              - Sid: GlueAccess
                Effect: Allow
                Action:
                  - glue:GetTable
                  - glue:GetTables
                  - glue:GetDatabase
                  - glue:GetDatabases
                Resource: '*'
              - Sid: LakeFormationDataAccess
                Effect: Allow
                Action:
                  - lakeformation:GetDataAccess
                  - lakeformation:GrantPermissions
                Resource: '*'

  rSUSDomain:
    Type: AWS::DataZone::Domain
    Properties:
      Name: !Ref pSUSDomainName
      Description: "The SUS domain (V2)"
      DomainExecutionRole: !GetAtt rSUSDomainExecutionRole.Arn
      DomainVersion: "V2"
      KmsKeyIdentifier: !GetAtt rSUSDomainKMSKey.Arn
      ServiceRole: !GetAtt rSUSDomainServiceRole.Arn
      SingleSignOn: {
        Type: "IAM_IDC",
        UserAssignment: "MANUAL",
        IdcInstanceArn: !Ref pSSOInstanceArn
      }

  rSUSAutomationRoleProfile:
    Type: AWS::DataZone::UserProfile
    Properties:
      DomainIdentifier: !Ref rSUSDomain
      UserIdentifier: !GetAtt rSUSAutomationRole.Arn
      UserType: IAM_ROLE
      Status: ASSIGNED

  rSUSDomainOwnerIAMRole:
    Type: AWS::DataZone::Owner
    DependsOn: rSUSAutomationRoleProfile
    # On stack delete, DataZone has *already* removed this owner
    # reference as part of its cascading domain teardown by the time
    # CFN's Delete handler fires. The handler then hits a 409
    # ConditionalCheckFailed and fails the stack. `Retain` tells CFN
    # to skip the Delete API call. Safe because the parent
    # `rSUSDomain` delete cascades all owner references on the
    # DataZone side, so nothing is orphaned in AWS — only CFN's
    # tracking row is dropped (which is fine because the entire stack
    # is being torn down). See the README "Common gotchas" entry on
    # the legacy `--retain-resources` workaround that this replaces.
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      DomainIdentifier: !Ref rSUSDomain
      EntityIdentifier: !GetAtt rSUSDomain.RootDomainUnitId
      EntityType: DOMAIN_UNIT
      Owner:
        User:
          UserIdentifier: !GetAtt rSUSAutomationRole.Arn

  rSUSGroupProfile:
    Type: AWS::DataZone::GroupProfile
    Properties:
      DomainIdentifier: !Ref rSUSDomain
      GroupIdentifier: !Ref pSSOGroupID
      Status: ASSIGNED

  rSUSDomainOwnerSSOGroup:
    Type: AWS::DataZone::Owner
    DependsOn: rSUSGroupProfile
    # Same race + same fix as rSUSDomainOwnerIAMRole above. SMUS
    # removes the SSO-group owner reference as part of cascading
    # domain teardown before CFN's Delete handler runs.
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      DomainIdentifier: !Ref rSUSDomain
      EntityIdentifier: !GetAtt rSUSDomain.RootDomainUnitId
      EntityType: DOMAIN_UNIT
      Owner:
        Group:
          GroupIdentifier: !Ref pSSOGroupID

Outputs:
  oSUSDomainID:
    Description: Domain ID for cross stack references
    Value: !Ref rSUSDomain
  oSUSrootDomainUnitID:
    Description: Root Domain Unit ID for cross stack references
    Value: !GetAtt rSUSDomain.RootDomainUnitId
  oSUSDomainKMSKeyArn:
    Description: Domain KMS Key ARN for cross stack references
    Value: !GetAtt rSUSDomainKMSKey.Arn
  oSUSDomainExecutionRoleArn:
    Description: ARN of the IAM Role assumed by SageMaker Domain to call APIs.
    Value: !GetAtt rSUSDomainExecutionRole.Arn
  oSUSDomainServiceRoleArn:
    Description: ARN of the IAM Role assumed by SageMaker Domain for domain level actions.
    Value: !GetAtt rSUSDomainServiceRole.Arn
  oSUSDomainName:
    Description: Name of the SUS Domain
    Value: !Ref pSUSDomainName
  oSUSAutomationRoleArn:
    Description: ARN of the IAM Role assumed by the SUS Automation Lambda Function.
    Value: !GetAtt rSUSAutomationRole.Arn
  oSUSAutomationRoleName:
    Description: Name of the SUS Automation Role.
    Value: !Ref pSUSAutomationRoleName
  oSUSLFRegistrationRoleArn:
    Description: ARN of the dedicated Lake Formation registration role used by smus-setup.sh for WithFederation re-registration of source S3 prefixes.
    Value: !GetAtt rSUSLFRegistrationRole.Arn
  oSUSLFRegistrationRoleName:
    Description: Name of the LF registration role.
    Value: !Ref rSUSLFRegistrationRole
  oSUSToolingProvisioningRoleArn:
    Description: ARN of the Tooling provisioning role.
    Value: !GetAtt rSUSToolingProvisioningRole.Arn
  oSUSToolingProvisioningRoleName:
    Description: Name of the Tooling provisioning role.
    Value: !Ref rSUSToolingProvisioningRole
  oSUSProjectsBucketName:
    Description: Name of the projects bucket scanned by SMUS for asset storage.
    Value: !Ref rSUSProjectsBucket
